apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kidsboard.fullname" . }}
  labels:
    {{- include "kidsboard.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "kidsboard.fullname" . }}-headless
  # SQLite is single-writer; replicas is hard-locked to 1. The .Values.replicaCount
  # knob is purposely ignored here — a second writer would corrupt the database.
  replicas: 1
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "kidsboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kidsboard.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll Pods when the configmap changes so app config and Pod come up
        # together. Computed checksum is stable across template renders.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kidsboard.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      # Init container runs schema migrations BEFORE the main container starts.
      # Goose is idempotent — already-applied migrations are a fast no-op.
      initContainers:
        - name: migrate
          image: {{ include "kidsboard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - migrate
            - --db
            - {{ .Values.app.dbPath | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.app.seedOnDeploy }}
        - name: seed
          image: {{ include "kidsboard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - seed
            - --db
            - {{ .Values.app.dbPath | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      containers:
        - name: kidsboard
          image: {{ include "kidsboard.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --addr
            - {{ .Values.app.addr | quote }}
            - --db
            - {{ .Values.app.dbPath | quote }}
            - --shutdown-timeout
            - {{ .Values.app.shutdownTimeout | quote }}
            - --read-timeout
            - {{ .Values.app.readTimeout | quote }}
            - --idle-timeout
            - {{ .Values.app.idleTimeout | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  # The PVC outlives the Pod — survives image rolls, chart upgrades, even
  # `helm uninstall` (PVC is left behind by default per StatefulSet semantics).
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "kidsboard.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
