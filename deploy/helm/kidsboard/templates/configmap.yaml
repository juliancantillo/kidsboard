apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kidsboard.fullname" . }}
  labels:
    {{- include "kidsboard.labels" . | nindent 4 }}
# 12-factor §III: config in env. These keys are consumed by `envFrom` in the
# StatefulSet so the binary reads them through viper at startup. Editing this
# ConfigMap (via `helm upgrade`) updates the Pod-template `checksum/config`
# annotation, triggering a rolling restart that picks up new values.
data:
  KIDSBOARD_ADDR:             {{ .Values.app.addr | quote }}
  KIDSBOARD_DB:               {{ .Values.app.dbPath | quote }}
  KIDSBOARD_SHUTDOWN_TIMEOUT: {{ .Values.app.shutdownTimeout | quote }}
  KIDSBOARD_READ_TIMEOUT:     {{ .Values.app.readTimeout | quote }}
  KIDSBOARD_IDLE_TIMEOUT:     {{ .Values.app.idleTimeout | quote }}
  KIDSBOARD_LOG_LEVEL:        {{ .Values.app.logLevel | quote }}
  KIDSBOARD_LOG_FORMAT:       {{ .Values.app.logFormat | quote }}
