apiVersion: v2
name: kidsboard
description: |
  RPG-style household activity tracker for kids. Single Go binary backed by an
  embedded SQLite database. Deployed as a single-replica StatefulSet with a
  PersistentVolumeClaim that survives upgrades; migrations run as an init
  container on every rollout.
type: application

# Chart version — bump on chart changes.
version: 0.1.0

# App version — image tag default is derived from this. Bump on app releases.
appVersion: "0.1.0"

home: https://github.com/juliancantillo/kidsboard
maintainers:
  - name: julian
    email: julian@cantillo.dev

keywords:
  - kids
  - chores
  - rpg
  - gamification
  - sqlite
