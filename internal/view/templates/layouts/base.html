{{ define "base.html" }}<!DOCTYPE html>
<html lang="es" class="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ block "title" . }}Kidsboard{{ end }}</title>
<!-- Prebuilt Tailwind stylesheet. Generated by `make css` from input.css and
     tailwind.config.js, then embedded via //go:embed in internal/view/static.go.
     Replaces the runtime CDN script so legacy browsers (iOS 9 Safari, etc.)
     get a static CSS file instead of a JIT runtime requiring ES6+ features. -->
<link rel="stylesheet" href="/static/css/kidsboard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;800;900&amp;family=Courier+Prime:wght@400;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&amp;display=swap" rel="stylesheet" />
<!-- Tiny inline overrides for rules Tailwind can't express. Keeps the
     above-the-fold paint fast even before the stylesheet finishes loading. -->
<style>
  html { background-color: #fff8f2; }
  body { image-rendering: pixelated; }
</style>
{{ block "head" . }}{{ end }}
</head>
<body class="text-ink font-body min-h-screen pb-24 antialiased relative">

<!-- Pixel-art bg layer: fixed, behind everything. Pages override via the
     "bg-name" block (default: meadow). The parchment overlay graduates from
     near-transparent at the top (so the sky reads) to near-opaque toward the
     bottom (so panels and text stay legible). -->
<div class="fixed inset-0 -z-10 pointer-events-none">
  <img class="pixel absolute inset-0 w-full h-full object-cover" alt=""
       src="/static/bg/{{ block "bg-name" . }}meadow{{ end }}.png" />
  <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(255,248,242,0.35) 0%, rgba(255,248,242,0.78) 55%, rgba(255,248,242,0.92) 100%);"></div>
  <!-- Subtle dot grain to tie the bg back into the parchment-grain panels -->
  <div class="absolute inset-0 opacity-40" style="background-image: radial-gradient(rgba(38,25,0,0.08) 1px, transparent 1px); background-size: 4px 4px;"></div>
</div>

<header class="wood-bg sticky top-0 z-40 border-b-4 border-ink shadow-pixel">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="flex items-center gap-3 text-parchment hover:text-surface-edge transition-colors">
      <div class="w-10 h-10 border-4 border-ink bg-surface-mid grid place-items-center shadow-pixel-sm">
        <span class="material-symbols-outlined text-ink" style="font-size:24px">castle</span>
      </div>
      <h1 class="font-display font-black tracking-tight text-2xl uppercase">Kidsboard</h1>
    </a>
    {{ block "topnav" . }}{{ end }}
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-8">
  {{ block "content" . }}{{ end }}
</main>

<footer class="text-center py-6 text-outline font-label text-xs uppercase tracking-widest">
  Press <span class="border border-outline px-1.5">START</span> · Kidsboard
</footer>

</body>
</html>
{{ end }}
