name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab for debugging.
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum privilege at the workflow root; every job opts in to anything more.
permissions:
  contents: read

# Opt every JavaScript action into Node.js 24. GitHub's runner will force this
# default in June 2026 anyway; setting it now silences deprecation warnings
# from actions whose maintainers haven't yet bumped their action.yml's `using:`.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Read the version from go.mod so CI tracks the project, not vice versa.
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./...

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm lint
        run: helm lint deploy/helm/kidsboard

      - name: Helm template (default values)
        run: helm template kidsboard deploy/helm/kidsboard > /dev/null

  docker-build:
    name: Docker build (amd64, no push)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sanity check, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: kidsboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=ci-${{ github.sha }}

      - name: Smoke-test container
        run: |
          docker run --rm kidsboard:ci --help > /dev/null
          echo "binary runs"
